  <text x="282.0" y="204" font-family="Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="700" text-anchor="middle">True Negative</text>
  <text x="282.0" y="242" font-family="Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="700" text-anchor="middle">78</text>
  <rect x="360" y="140" width="144" height="144" rx="8" fill="#dc2626" stroke="none"/>
  <rect x="360" y="140" width="144" height="144" rx="8" fill="white" opacity="0.65"/>
  <text x="432.0" y="204" font-family="Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="700" text-anchor="middle">False Positive</text>
  <text x="432.0" y="242" font-family="Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="700" text-anchor="middle">22</text>
  <rect x="210" y="290" width="144" height="144" rx="8" fill="#dc2626" stroke="none"/>
