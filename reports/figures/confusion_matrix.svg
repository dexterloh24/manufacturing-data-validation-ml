  <text x="282.0" y="392" font-family="Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="700" text-anchor="middle">41</text>
  <rect x="360" y="290" width="144" height="144" rx="8" fill="#16a34a" stroke="none"/>
  <rect x="360" y="290" width="144" height="144" rx="8" fill="white" opacity="0.26"/>
  <text x="432.0" y="354" font-family="Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="700" text-anchor="middle">True Positive</text>
  <text x="432.0" y="392" font-family="Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="700" text-anchor="middle">71</text>
