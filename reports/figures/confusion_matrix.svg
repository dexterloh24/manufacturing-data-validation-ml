  <text x="40" y="68" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="400" text-anchor="start">Holdout classification results at 0.50 probability threshold</text>
  <text x="360" y="108" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="700" text-anchor="middle">Predicted</text>
  <text x="72" y="290" font-family="Arial, sans-serif" font-size="14" fill="#0f172a" font-weight="700" text-anchor="middle">Actual</text>
  <text x="285.0" y="124" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="700" text-anchor="middle">Pass</text>
  <text x="435.0" y="124" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="700" text-anchor="middle">Fail</text>
  <text x="194" y="220.0" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="700" text-anchor="end">Pass</text>
  <text x="194" y="370.0" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="700" text-anchor="end">Fail</text>
  <rect x="210" y="140" width="144" height="144" rx="8" fill="#16a34a" stroke="none"/>
